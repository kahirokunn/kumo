{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kumo.fullname" . }}
  labels:
    {{- include "kumo.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "kumo.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - {}
  egress: []
{{- end }}
