apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "kumo.fullname" . }}
  labels:
    {{- include "kumo.labels" . | nindent 4 }}
spec:
  replicas: 1
  serviceName: {{ include "kumo.fullname" . }}
  selector:
    matchLabels:
      {{- include "kumo.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kumo.selectorLabels" . | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: 35
      securityContext:
        runAsNonRoot: true
        runAsUser: 10000
        runAsGroup: 10000
        fsGroup: 10000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: kumo
          image: "{{ .Values.kumo.image.registry }}/{{ .Values.kumo.image.repository }}:{{ .Values.kumo.image.tag | default .Chart.AppVersion }}"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          ports:
            - name: http
              containerPort: 4566
              protocol: TCP
          env:
            - name: KUMO_DATA_DIR
              value: "/data"
            - name: KUMO_LOG_LEVEL
              value: {{ .Values.kumo.logLevel | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.kumo.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
{{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
{{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
