name: Helm E2E Test

on:
  push:
    branches:
      - main
    paths:
      - 'charts/**'
      - 'test/e2e/**'
      - '.github/workflows/helm-e2e.yaml'
  pull_request:
    paths:
      - 'charts/**'
      - 'test/e2e/**'
      - '.github/workflows/helm-e2e.yaml'

permissions:
  contents: read

jobs:
  helm-e2e:
    name: Helm e2e
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install kind
        uses: helm/kind-action@v1
        with:
          install_only: true

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Run Helm e2e
        run: make test-helm-e2e
